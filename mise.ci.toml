# Loaded on top of mise.toml when MISE_ENV=ci. CI workflows set that
# variable so e2e jobs target the shared CI repositories and so secret
# refs (op://…) are resolved at runtime by `op run --`. The CI step
# must export OP_SERVICE_ACCOUNT_TOKEN for op to authenticate.

[vars]
# Surface oxlint findings as GitHub Actions annotations and flag stale
# eslint-disable comments — local devs don't need either.
oxlint_args = "--report-unused-disable-directives --format=github"

# Resolve op:// references in this task's env before invoking pnpm.
op_run = "op run --"

[env]
E2E_GITHUB_V1_PROJECT = "ccext-e2e-ci-v3"
E2E_GITHUB_V2_PROJECT = "ccext-e2e-ci-v3"
E2E_GITLAB_V1_PROJECT = "ccext-e2e-ci-v3"
E2E_GITLAB_V2_PROJECT = "ccext-e2e-ci-v3"
E2E_GITHUB_V1_PROJECT_CONVENTION_VALID = "ccext-e2e-ci-convention-valid-v3"
E2E_GITHUB_V2_PROJECT_CONVENTION_VALID = "ccext-e2e-ci-convention-valid-v3"
E2E_GITLAB_V1_PROJECT_CONVENTION_VALID = "ccext-e2e-ci-convention-valid-v3"
E2E_GITLAB_V2_PROJECT_CONVENTION_VALID = "ccext-e2e-ci-convention-valid-v3"
E2E_GITHUB_V1_PROJECT_CONVENTION_INVALID = "ccext-e2e-ci-convention-invalid-v3"
E2E_GITHUB_V2_PROJECT_CONVENTION_INVALID = "ccext-e2e-ci-convention-invalid-v3"
E2E_GITLAB_V1_PROJECT_CONVENTION_INVALID = "ccext-e2e-ci-convention-invalid-v3"
E2E_GITLAB_V2_PROJECT_CONVENTION_INVALID = "ccext-e2e-ci-convention-invalid-v3"

# Secret references, resolved at runtime by `op run --`. The strings
# below are *not* secrets — they are paths into the shared 1password
# vault. The actual values stay in 1password.
E2E_GITHUB_V1_USERNAME = "op://Conventional comments/GitHub V1/username"
E2E_GITHUB_V1_PASSWORD = "op://Conventional comments/GitHub V1/password"
E2E_GITHUB_V1_TOKEN = "op://Conventional comments/GitHub V1/token"
E2E_GITHUB_V1_TWO_FACTOR_SECRET = "op://Conventional comments/GitHub V1/2fa secret"
E2E_GITHUB_V2_USERNAME = "op://Conventional comments/GitHub V2/username"
E2E_GITHUB_V2_PASSWORD = "op://Conventional comments/GitHub V2/password"
E2E_GITHUB_V2_TOKEN = "op://Conventional comments/GitHub V2/token"
E2E_GITHUB_V2_TWO_FACTOR_SECRET = "op://Conventional comments/GitHub V2/2fa secret"
E2E_GITLAB_V1_USERNAME = "op://Conventional comments/GitLab V1/username"
E2E_GITLAB_V1_PASSWORD = "op://Conventional comments/GitLab V1/password"
E2E_GITLAB_V1_TOKEN = "op://Conventional comments/GitLab V1/token"
E2E_GITLAB_V1_TWO_FACTOR_SECRET = "op://Conventional comments/GitLab V1/2fa secret"
E2E_GITLAB_V2_USERNAME = "op://Conventional comments/GitLab V2/username"
E2E_GITLAB_V2_PASSWORD = "op://Conventional comments/GitLab V2/password"
E2E_GITLAB_V2_TOKEN = "op://Conventional comments/GitLab V2/token"
E2E_GITLAB_V2_TWO_FACTOR_SECRET = "op://Conventional comments/GitLab V2/2fa secret"
