name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup node
        uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

  unit-test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup node
        uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run Vitest
        run: npx vitest

  lint:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup node
        uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run oxlint
        run: npx oxlint --max-warnings=0 --report-unused-disable-directives --format=github

  prettier:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup node
        uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run Prettier
        run: npx prettier . -l

  typescript:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup node
        uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Check TypeScript
        run: npx tsc --noEmit

  component-test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup node
        uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test -c tests/components/playwright.config.ts

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-components
          path: playwright-report/
          retention-days: 30

  e2e:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs:
      - "build"
      - "unit-test"
      - "lint"
      - "prettier"
      - "typescript"
      - "component-test"
    strategy:
      fail-fast: false
      matrix:
        project:
          - "gitlab-v1"
          - "gitlab-v2"
          - "github-v1"
          - "github-v2"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup 1password
        uses: 1password/load-secrets-action/configure@v2
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        if: ${{ startsWith(matrix.project, 'gitlab-') }}

      - name: Load secret
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          E2E_GITHUB_V1_USERNAME: "op://Conventional comments/GitHub V1/username"
          E2E_GITHUB_V1_PASSWORD: "op://Conventional comments/GitHub V1/password"
          E2E_GITHUB_V1_TOKEN: "op://Conventional comments/GitHub V1/token"
          E2E_GITHUB_V1_TWO_FACTOR_SECRET: "op://Conventional comments/GitHub V1/2fa secret"
          E2E_GITHUB_V2_USERNAME: "op://Conventional comments/GitHub V2/username"
          E2E_GITHUB_V2_PASSWORD: "op://Conventional comments/GitHub V2/password"
          E2E_GITHUB_V2_TOKEN: "op://Conventional comments/GitHub V2/token"
          E2E_GITHUB_V2_TWO_FACTOR_SECRET: "op://Conventional comments/GitHub V2/2fa secret"
          E2E_GITLAB_V1_USERNAME: "op://Conventional comments/GitLab V1/username"
          E2E_GITLAB_V1_PASSWORD: "op://Conventional comments/GitLab V1/password"
          E2E_GITLAB_V1_TOKEN: "op://Conventional comments/GitLab V1/token"
          E2E_GITLAB_V1_TWO_FACTOR_SECRET: "op://Conventional comments/GitLab V1/2fa secret"
          E2E_GITLAB_V2_USERNAME: "op://Conventional comments/GitLab V2/username"
          E2E_GITLAB_V2_PASSWORD: "op://Conventional comments/GitLab V2/password"
          E2E_GITLAB_V2_TOKEN: "op://Conventional comments/GitLab V2/token"
          E2E_GITLAB_V2_TWO_FACTOR_SECRET: "op://Conventional comments/GitLab V2/2fa secret"

      - name: Dump cookies
        run: op read --out-file tests/e2e/playwright/.auth/user-gitlab-v1.json "op://Conventional comments/GitLab V1/cookies"
        if: ${{ matrix.project == 'gitlab-v1' }}

      - name: Dump cookies
        run: op read --out-file tests/e2e/playwright/.auth/user-gitlab-v2.json "op://Conventional comments/GitLab V2/cookies"
        if: ${{ matrix.project == 'gitlab-v2' }}

      - name: Setup node
        uses: actions/setup-node@v5
        with:
          node-version-file: ".tool-versions"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run Playwright tests
        run: npx playwright test -c tests/e2e/playwright.config.ts --project ${{ matrix.project }}

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-e2e-${{ matrix.project }}
          path: |
            playwright-report/
            playwright-videos/
            test-results/
          retention-days: 30
