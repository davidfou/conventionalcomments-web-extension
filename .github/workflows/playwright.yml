name: Playwright Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18.16.1
      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
      - name: Install dependencies
        run: yarn
      - name: Install Playwright Browsers
        run: yarn playwright install --with-deps chromium
      - name: Build extension
        run: yarn build
      - name: Run Playwright tests
        uses: coactions/setup-xvfb@v1
        env:
          E2E_GITLAB_USERNAME: ${{ secrets.E2E_GITLAB_USERNAME }}
          E2E_GITLAB_PASSWORD: ${{ secrets.E2E_GITLAB_PASSWORD }}
          E2E_GITLAB_TOKEN: ${{ secrets.E2E_GITLAB_TOKEN }}
          E2E_GITLAB_2FA_SECRET: ${{ secrets.E2E_GITLAB_2FA_SECRET }}
          E2E_GOOGLE_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          NODE_CONFIG_ENV: ci
        with:
          run: yarn playwright test --project=setup-gitlab
      - uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-videos/
          retention-days: 5
