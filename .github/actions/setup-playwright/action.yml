name: Setup Playwright
description: Cache and install Playwright browsers (chromium) and their system fonts
runs:
  using: composite
  steps:
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      id: cache
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

    - name: Install Playwright browsers
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: mise exec -- pnpm playwright install chromium

    # `playwright install-deps` periodically hangs for ~60 minutes on flaky
    # Ubuntu mirrors. Install only the packages the runner is actually
    # missing (everything else chromium needs is pre-installed on
    # ubuntu-latest).
    - name: Install Chromium system fonts (manual, bypass playwright install-deps)
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          fonts-unifont \
          xfonts-utils
